services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: experimentos-postgres
    environment:
      POSTGRES_DB: experimentos
      POSTGRES_USER: experimentos
      POSTGRES_PASSWORD: experimentos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U experimentos -d experimentos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
