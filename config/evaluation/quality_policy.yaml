version: "2026-07-13"
sources:
  rag:
    path: evaluation.md
    format: rag_markdown
  agent:
    path: agent_evaluation.md
    format: agent_markdown
  agent_e2e:
    path: agent_e2e_evaluation.md
    format: agent_e2e_markdown
  ragas:
    path: phase3/ragas_report.json
    format: ragas_json
  deepeval:
    path: phase3/deepeval_report.json
    format: deepeval_json
  prompt_regression:
    path: phase3/prompt_regression.json
    format: prompt_regression_json
  factuality:
    path: phase3/factuality_report.json
    format: factuality_json
metrics:
  - metric_id: rag.retrieval_success_rate
    source: rag
    category: Retrieval
    operator: gte
    value: 1.0
    severity: fail
    required: true
    weight: 1.0
    description: Preserve deterministic retrieval success for the legacy QA surface.
  - metric_id: rag.average_citation_coverage
    source: rag
    category: Retrieval
    operator: gte
    value: 1.0
    severity: fail
    required: true
    weight: 1.0
    description: Preserve full citation coverage for the legacy QA surface.
  - metric_id: ragas.id_based_context_precision
    source: ragas
    category: Retrieval
    operator: gte
    value: 1.0
    severity: fail
    required: true
    weight: 1.0
    description: Repository-owned retrieval precision must remain perfect offline.
  - metric_id: ragas.id_based_context_recall
    source: ragas
    category: Retrieval
    operator: gte
    value: 1.0
    severity: fail
    required: true
    weight: 1.0
    description: Repository-owned retrieval recall must remain perfect offline.
