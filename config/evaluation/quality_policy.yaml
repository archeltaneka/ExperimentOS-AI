    operator: gte
    value: 0.5
    severity: warning
    required: false
    weight: 0.5
    description: Judge-backed RAGAS answer relevancy is advisory when available.
  - metric_id: ragas.faithfulness
    source: ragas
    category: Answer Quality
    operator: gte
    value: 0.5
    severity: warning
    required: false
    weight: 0.5
