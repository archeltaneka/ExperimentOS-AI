name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_ENV: ci
  ASK_MODE: agent_workflow
  EMBEDDING_PROVIDER: fake
  LLM_PROVIDER: mock
  RAGAS_JUDGE_LLM_PROVIDER: none
  RAGAS_JUDGE_EMBEDDING_PROVIDER: none
  DEEPEVAL_JUDGE_PROVIDER: none
  PROMPT_EXPERIMENTS_ENABLED: "false"
  EXPERIMENTOS_LANGSMITH_ENABLED: "false"
  EXPERIMENTOS_PHOENIX_ENABLED: "false"
  EXPERIMENTOS_OTEL_ENABLED: "false"
  EXPERIMENTOS_OTEL_EXPORTER_TYPE: none
  LANGSMITH_TRACING: "false"
  LANGSMITH_API_KEY: ""
  OPENAI_API_KEY: ""
  GOOGLE_API_KEY: ""
  PYTHONHASHSEED: "0"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync development dependencies
        run: uv sync --group dev --frozen

      - name: Check formatting
        run: uv run ruff format --check .

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync development dependencies
        run: uv sync --group dev --frozen

      - name: Run Ruff
        run: uv run ruff check .

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync validation dependencies
        run: uv sync --group dev --group observability --frozen

      - name: Validate prompt registry
        run: uv run python -m packages.llm.prompt_registry_cli validate

      - name: Validate prompt experiment definitions
        run: >-
          uv run python -m packages.evals.run_prompt_experiment
          validate
          --experiment rag-answer-abstention-v1-v2

      - name: Validate observability configuration
        run: >-
          uv run python -m packages.observability.cli
          validate
          --provider all

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync unit test dependencies
        run: uv sync --group dev --group eval --group observability --frozen

      - name: Run deterministic unit tests
        run: >-
          uv run pytest
          tests/test_api_health.py
          tests/test_api_ask.py
          tests/test_agent_workflow.py
          tests/test_prompt_registry.py
          tests/test_prompt_registry_cli.py
          tests/test_prompt_experiment_cli.py
          tests/test_prompt_experiment_validation.py
          tests/test_observability_cli.py
          tests/test_prompt_regression.py
          tests/test_factuality.py
          tests/test_quality_policy.py
          tests/test_ci_quality_gate.py
          tests/test_evaluation_harness.py
          tests/test_ragas_evaluation.py
          tests/test_phase3_baseline.py
          tests/test_github_actions_ci.py
          tests/test_repository_hygiene.py
          -v

  offline-eval-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync evaluation dependencies
        run: uv sync --group dev --group eval --frozen

      - name: Prepare offline artifact directory
        run: mkdir -p artifacts/ci/offline/phase3

      - name: Run prompt regression smoke
        run: >-
          uv run python -m packages.evals.run_prompt_regression
          --prompt-id rag.answer
          --baseline-version 1
          --candidate-version 1
          --offline
          --dataset data/eval/ci_smoke_dataset.json
          --embedding-provider fake
          --llm-provider mock
          --output artifacts/ci/offline/phase3/prompt_regression.md
          --json-output artifacts/ci/offline/phase3/prompt_regression.json

      - name: Run factuality smoke
        run: >-
          uv run python -m packages.evals.run_factuality
          --dataset data/eval/ci_smoke_dataset.json
          --agent-dataset data/eval/agent_dataset.json
          --target agent_workflow
          --mode offline
          --embedding-provider fake
          --llm-provider mock
          --output artifacts/ci/offline/phase3/factuality_report.md
          --json-output artifacts/ci/offline/phase3/factuality_report.json

      - name: Run quality policy command validation
        run: >-
          uv run python -m packages.evals.run_quality_policy
          --report-dir artifacts/ci/offline
          --warn-only
          --output artifacts/ci/offline/phase3/quality_policy.md
          --json-output artifacts/ci/offline/phase3/quality_policy.json

      - name: Upload offline evaluation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: offline-eval-smoke
          path: artifacts/ci/offline
          if-no-files-found: warn

  integration-db:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: experimentos_ci
          POSTGRES_USER: experimentos_ci
          POSTGRES_PASSWORD: experimentos_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U experimentos_ci -d experimentos_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://experimentos_ci:experimentos_ci@localhost:5433/experimentos_ci
    steps:
      - name: Record prerequisite status
        id: prerequisites
        if: ${{ always() }}
        env:
          FORMAT_RESULT: ${{ needs.format.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          OFFLINE_EVAL_RESULT: ${{ needs.offline-eval-smoke.result }}
          INTEGRATION_RESULT: ${{ needs.integration-db.result }}
        shell: bash
        run: |
          prerequisite_exit_code=0
          for result in "$FORMAT_RESULT" "$LINT_RESULT" "$VALIDATE_RESULT" "$UNIT_RESULT" "$OFFLINE_EVAL_RESULT" "$INTEGRATION_RESULT"; do
            if [[ "$result" != "success" ]]; then
              prerequisite_exit_code=2
            fi
          done
          echo "prerequisite_exit_code=$prerequisite_exit_code" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync integration dependencies
        run: uv sync --group dev --group eval --group observability --frozen

      - name: Wait for PostgreSQL readiness
        timeout-minutes: 2
        run: |
          uv run python - <<'PY'
          import time
          import psycopg

          deadline = time.time() + 120
          dsn = "postgresql://experimentos_ci:experimentos_ci@localhost:5433/experimentos_ci"
          last_error = None

          while time.time() < deadline:
              try:
                  with psycopg.connect(dsn):
                      print("postgres ready")
                      raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(5)

          raise SystemExit(f"postgres not ready: {last_error}")
          PY

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Prepare integration artifact directory
        run: mkdir -p artifacts/ci/integration/phase3

      - name: Seed deterministic integration dataset
        run: >-
          uv run python -m packages.ingestion.load_experiment
          --experiment-dir tests/fixtures/ci/exp-001-payment-recommendation
          --embedding-provider fake

      - name: Run database-backed integration tests
        timeout-minutes: 10
        run: >-
          uv run pytest
          tests/test_alembic_config.py
          tests/test_db_models.py
          tests/test_db_session.py
          tests/test_ingestion_load_experiment.py
          tests/test_retrieval_service.py
          tests/test_api_ask.py
          tests/test_agent_workflow.py
          tests/test_api_ask_db_integration.py
          -v

      - name: Run DB-backed baseline smoke
        timeout-minutes: 8
        run: >-
          uv run python -m packages.evals.run_baseline
          --dataset data/eval/ci_smoke_dataset.json
          --agent-dataset data/eval/agent_dataset.json
          --embedding-provider fake
          --llm-provider mock
          --rag-output artifacts/ci/integration/evaluation.md
          --agent-output artifacts/ci/integration/agent_evaluation.md
          --agent-e2e-output artifacts/ci/integration/agent_e2e_evaluation.md
          --factuality-output artifacts/ci/integration/phase3/factuality_report.md
          --factuality-json-output artifacts/ci/integration/phase3/factuality_report.json
          --quality-policy-output artifacts/ci/integration/phase3/quality_policy.md
          --quality-policy-json-output artifacts/ci/integration/phase3/quality_policy.json
          --output artifacts/ci/integration/phase3/baseline_report.md

      - name: Upload integration artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-db-reports
          path: artifacts/ci/integration
          if-no-files-found: warn

  ai-quality-gate:
    needs:
      - format
      - lint
      - validate
      - unit
      - offline-eval-smoke
      - integration-db
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: experimentos_ci
          POSTGRES_USER: experimentos_ci
          POSTGRES_PASSWORD: experimentos_ci
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U experimentos_ci -d experimentos_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://experimentos_ci:experimentos_ci@localhost:5433/experimentos_ci
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync AI quality gate dependencies
        run: uv sync --group dev --group eval --group observability --frozen

      - name: Prepare AI quality artifact directory
        run: mkdir -p artifacts/ci/ai-quality/phase3

      - name: Wait for PostgreSQL readiness
        timeout-minutes: 2
        run: |
          uv run python - <<'PY'
          import time
          import psycopg

          deadline = time.time() + 120
          dsn = "postgresql://experimentos_ci:experimentos_ci@localhost:5433/experimentos_ci"
          last_error = None

          while time.time() < deadline:
              try:
                  with psycopg.connect(dsn):
                      print("postgres ready")
                      raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(5)

          raise SystemExit(f"postgres not ready: {last_error}")
          PY

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Detect quality policy changes
        id: policy_changes
        shell: bash
        run: |
          changed=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${{ github.event.before }}"
          else
            base_sha=""
          fi

          if [[ -n "$base_sha" ]] && git diff --name-only "$base_sha" "$GITHUB_SHA" -- | grep -Fxq "config/evaluation/quality_policy.yaml"; then
            changed=true
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Validate AI quality environment
        run: >-
          uv run python scripts/validate_ci_environment.py
          --output artifacts/ci/ai-quality/phase3/ci_environment.json

      - name: Run AI quality gate
        id: quality_gate
        if: ${{ always() }}
        shell: bash
        run: |
          set +e
          uv run python scripts/run_ai_quality_gate.py \
            --artifact-root artifacts/ci/ai-quality \
            --artifact-name ai-quality-gate-${{ github.run_id }}-${{ github.run_attempt }} \
            --policy-changed ${{ steps.policy_changes.outputs.changed || 'false' }}
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build pull request quality report
        id: ci_report
        if: ${{ always() }}
        shell: bash
        run: |
          set +e
          uv run python -m packages.evals.cli ci-report build \
            --report-dir artifacts/ci/ai-quality \
            --output artifacts/ci/ai-quality/phase3/pr_quality_report.json \
            --workflow-run-id ${{ github.run_id }} \
            --repository ${{ github.repository }} \
            --commit-sha ${{ github.sha }} \
            --base-ref "${{ github.base_ref }}" \
            --head-ref "${{ github.head_ref }}"
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish AI quality summary
        if: ${{ always() }}
        shell: bash
        run: |
          summary_path="artifacts/ci/ai-quality/phase3/pr_quality_report.md"
          if [[ -f "$summary_path" ]]; then
            cat "$summary_path" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "# AI Quality Gate Summary"
              echo
              echo "- Overall quality status: infrastructure_fail"
              echo "- Infrastructure failure: summary file was not generated."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload AI quality artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ai-quality-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/ai-quality
          if-no-files-found: warn
          retention-days: 14

      - name: Restore AI quality gate result
        if: ${{ always() }}
        shell: bash
        run: |
          gate_exit_code="${{ steps.quality_gate.outputs.exit_code || '2' }}"
          report_exit_code="${{ steps.ci_report.outputs.exit_code || '2' }}"
          prerequisite_exit_code="${{ steps.prerequisites.outputs.prerequisite_exit_code || '2' }}"
          if [[ "$gate_exit_code" != "0" ]]; then
            exit "$gate_exit_code"
          fi
          if [[ "$report_exit_code" != "0" ]]; then
            exit "$report_exit_code"
          fi
          exit "$prerequisite_exit_code"

  pr-quality-comment:
    needs:
      - ai-quality-gate
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-python: true
          cache-dependency-glob: uv.lock

      - name: Sync reporting dependencies
        run: uv sync --group dev --frozen

      - name: Download AI quality artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: ai-quality-gate-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/ai-quality

      - name: Update pull request quality comment
        if: ${{ always() }}
        shell: bash
        run: |
          body_path="artifacts/ci/ai-quality/phase3/pr_comment.md"
          if [[ ! -f "$body_path" ]]; then
            echo "PR comment skipped: CI report artifact was unavailable."
            exit 0
          fi
          uv run python -m packages.evals.cli ci-report comment \
            --body-file "$body_path" \
            --repository "${{ github.repository }}" \
            --pull-request-number "${{ github.event.pull_request.number }}" || \
            echo "PR comment was unavailable; job summary and artifacts remain authoritative."
